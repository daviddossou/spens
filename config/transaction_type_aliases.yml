# Alias dictionary — merchant / mode / synonym phrases the category picker uses to
# SUGGEST a subcategory. It never silently rewrites what the user types; it just makes the
# right node easy to find (typing "Carrefour" surfaces "Groceries").
#
# Format:  <subcategory key>: ["phrase", "phrase", ...]
#   - Every key MUST match a CHILD key in config/transaction_taxonomy.yml.
#   - Matching is case-, accent- and punctuation-insensitive ("zémidjan" == "zemidjan",
#     "j'adore" == "jadore"), so you don't need to list every spelling variant.
#   - EN + FR + local terms live together; the picker merges them.
#   - This same dictionary later seeds voice categorisation. Region: Benin / West Africa.

