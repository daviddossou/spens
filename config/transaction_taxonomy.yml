# Category taxonomy (Parent -> Subcategory, two flat levels).
#
# ⚠ One-time seed + fresh-DB fallback only. The runtime source of truth is the
# taxonomy_nodes table (seeded by taxonomy:import_nodes, edited from the admin
# dashboard). After the first import, edits here are IGNORED — change it in admin.
#
# - Keys are STABLE and locale-independent (snake_case). Never rename a key once shipped;
#   the per-space `transaction_types.template_key` points at it.
# - Names are bilingual (en/fr) right here, so EN and FR can never drift apart.
# - Read by the TransactionTaxonomy registry; transactions attach to a parent OR a child,
#   and analytics rolls a parent up over its children.
# - Aliases (merchant/mode synonyms that the picker uses to SUGGEST a node) live in a
#   separate file: config/transaction_type_aliases.yml
#
# Verified for Benin / West Africa. `uncategorized_expense` / `uncategorized_income`
# are the default parents for user-created nodes that don't match a template.

